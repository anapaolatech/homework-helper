<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Homework Helper</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fade-up 0.3s ease-out both; }

    @keyframes bounce-dot {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }
    .dot1 { animation: bounce-dot 1.1s ease-in-out infinite; }
    .dot2 { animation: bounce-dot 1.1s ease-in-out 0.18s infinite; }
    .dot3 { animation: bounce-dot 1.1s ease-in-out 0.36s infinite; }
  </style>
</head>

const TOPICS = [
  // ── KINDERGARTEN ───────────────────────────────────────────────────────────
  [
    {
      id:'k-counting', emoji:'🔢', title:'Counting to 20',
      child:'We count objects one at a time, touching each one so we don\'t skip any. We also use a "ten-frame" — a box with two rows of 5 spots — to see how many we have at a glance. Try counting these: 🍎🍎🍎🍎🍎🍎🍎 — touch each apple and say the number out loud!',
      parent:'Counting is the same as you remember! The main difference today is the ten-frame tool. It\'s a grid with 10 boxes (2 rows of 5). Kids fill it with dots to "see" numbers — so 7 looks like a full row of 5 plus 2 more. This builds the foundation for addition later, because kids can see that 7 is "5 and 2 more."',
      example:{ problem:'Count the stars: ⭐⭐⭐⭐⭐⭐⭐⭐⭐', steps:['Point to each star and say the number: 1, 2, 3…','Keep going until you reach the last one.','The last number you said is the answer: 9!'], answer:'9 stars' },
      practice:[
        { problem:'Count the apples: 🍎🍎🍎🍎🍎🍎', answer:'6 apples' },
        { problem:'Count the dots: • • • • • • • • • • • • •', answer:'13 dots' },
      ]
    },
    {
      id:'k-addition', emoji:'➕', title:'Adding to 10',
      child:'Adding means putting two groups together! If you have 3 crayons and you get 2 more, you can count them all: 1, 2, 3… 4, 5. So 3 + 2 = 5! You can also "count on" — start at 3 and count up 2 more: "4, 5." That\'s the answer!',
      parent:'Today\'s classes teach two strategies: "count all" (count every object from the start) and "count on" (start from the bigger number and count up). "Count on" is considered more efficient. So for 3 + 5, instead of counting all 8, the child starts at 5 and counts on 3 more: "6, 7, 8." Same answer, faster method.',
      example:{ problem:'3 + 4 = ?', steps:['Start at the bigger number: 4','Count on 3 more: "5, 6, 7"','You landed on 7 — that\'s your answer!'], answer:'7' },
      practice:[
        { problem:'2 + 5 = ?', answer:'7' },
        { problem:'4 + 4 = ?', answer:'8' },
        { problem:'1 + 6 = ?', answer:'7' },
      ]
    },
    {
      id:'k-subtraction', emoji:'➖', title:'Taking Away (Subtraction)',
      child:'Subtraction means taking some away! If you have 6 cookies and you eat 2, how many are left? Start at 6 and count backwards 2: "5, 4." So 6 - 2 = 4. You can also cross out objects and count what\'s left.',
      parent:'The language schools use now is "take away" or "how many are left?" before introducing the minus sign. Kids are also taught to "count back" (like counting backwards) or to "count up" from the smaller to the larger number. Counting up is surprisingly efficient: for 7 - 5, instead of counting back from 7, count up from 5: "6, 7" — that\'s 2 jumps, so the answer is 2.',
      example:{ problem:'8 - 3 = ?', steps:['Start at 8','Count back 3: "7, 6, 5"','You landed on 5!'], answer:'5' },
      practice:[
        { problem:'5 - 2 = ?', answer:'3' },
        { problem:'9 - 4 = ?', answer:'5' },
      ]
    },
  ],
  // ── 1ST GRADE ──────────────────────────────────────────────────────────────
  [
    {
      id:'1-place-value', emoji:'🧱', title:'Place Value: Tens and Ones',
      child:'Every number has a special address! The "ones" place is on the right — it holds single cubes. The "tens" place is next to it — it holds a rod of 10 cubes all stuck together. So 34 means 3 rods of ten (30) and 4 single cubes (4). 3 tens + 4 ones = 34!',
      parent:'You probably learned columns labeled hundreds, tens, ones — same concept. Today schools use physical base-10 blocks: small cubes (1s) and long rods (10s). Kids build the number with blocks before they write it. This hands-on step is why your child might draw little rods and dots on their paper instead of just writing the digits.',
      example:{ problem:'What number is 2 tens and 7 ones?', steps:['2 tens = 20','7 ones = 7','20 + 7 = 27'], answer:'27' },
      practice:[
        { problem:'What is 4 tens and 3 ones?', answer:'43' },
        { problem:'Break apart 56: how many tens? How many ones?', answer:'5 tens and 6 ones' },
      ]
    },
    {
      id:'1-addition-20', emoji:'➕', title:'Adding to 20 (Make a Ten)',
      child:'There\'s a cool trick called "make a ten"! If you see 8 + 5, ask: what does 8 need to become 10? It needs 2. Borrow 2 from the 5: now you have 10 + 3 = 13. Making a ten first makes it way easier!',
      parent:'You probably learned these by memorizing addition facts. That\'s still the goal! But the "make a ten" strategy (also called "bridging to ten") teaches kids WHY the facts are true. For 8 + 5: move 2 from the 5 over to the 8 to make 10, leaving 3. So 10 + 3 = 13. Once they understand it, the memorization sticks better.',
      example:{ problem:'9 + 6 = ?', steps:['9 needs 1 to become 10','Take 1 from the 6: 6 becomes 5','Now it\'s 10 + 5','Answer: 15'], answer:'15' },
      practice:[
        { problem:'8 + 7 = ?', answer:'15' },
        { problem:'7 + 6 = ?', answer:'13' },
        { problem:'9 + 4 = ?', answer:'13' },
      ]
    },
    {
      id:'1-subtraction-20', emoji:'➖', title:'Subtracting from 20',
      child:'For bigger subtractions, try "counting up"! For 14 - 8, start at 8 and count up to 14: "9, 10, 11, 12, 13, 14" — that\'s 6 jumps. So 14 - 8 = 6. You can also use a number line and hop forward from 8 until you reach 14.',
      parent:'The "count up" method (also called "think addition") is taught because it\'s often faster and less error-prone than counting back. For 13 - 7, instead of counting back 7 from 13, think: "7 + ? = 13" and count up. Same answer, but kids find it more intuitive. This also builds a strong connection between addition and subtraction.',
      example:{ problem:'12 - 7 = ?', steps:['Start at 7, count up to 12','7 → 8, 9, 10, 11, 12','That\'s 5 jumps'], answer:'5' },
      practice:[
        { problem:'15 - 8 = ?', answer:'7' },
        { problem:'11 - 6 = ?', answer:'5' },
      ]
    },
  ],
  // ── 2ND GRADE ──────────────────────────────────────────────────────────────
  [
    {
      id:'2-addition-2digit', emoji:'➕', title:'Two-Digit Addition (Break Apart)',
      child:'To add 47 + 38, break the numbers into tens and ones first!\n47 = 40 + 7\n38 = 30 + 8\nNow add the tens: 40 + 30 = 70\nNow add the ones: 7 + 8 = 15\nFinally add them together: 70 + 15 = 85!',
      parent:'You probably stacked the numbers and "carried the 1." That still works! But the break-apart method (also called "partial sums") teaches kids why carrying works. When you carried the 1 from 7+8=15, you were really moving 10 into the tens column — that\'s exactly what this method shows explicitly. Once kids understand it this way, the standard algorithm makes more sense.',
      example:{ problem:'35 + 47 = ?', steps:['Break apart: 35 = 30 + 5, and 47 = 40 + 7','Add the tens: 30 + 40 = 70','Add the ones: 5 + 7 = 12','Add it all: 70 + 12 = 82'], answer:'82' },
      practice:[
        { problem:'26 + 45 = ?', answer:'71' },
        { problem:'53 + 38 = ?', answer:'91' },
        { problem:'64 + 27 = ?', answer:'91' },
      ]
    },
    {
      id:'2-subtraction-regroup', emoji:'➖', title:'Subtraction with Regrouping',
      child:'When the top number is smaller than the bottom, you need to regroup! For 52 - 27: the ones column is 2 - 7, but 2 is too small. So "regroup" — take 1 ten from the 5 tens. Now you have 4 tens and 12 ones. 12 - 7 = 5, and 4 - 2 = 2. Answer: 25!',
      parent:'You called this "borrowing." Same process, new name — today schools say "regrouping" because you\'re not borrowing (nothing is paid back!), you\'re reorganizing. A ten becomes ten ones. The math is identical; just the language changed. If your child says "I have to regroup," they mean the same thing you did.',
      example:{ problem:'63 - 28 = ?', steps:['Ones column: 3 - 8 won\'t work, so regroup','Take 1 ten from the 6 tens: now 5 tens and 13 ones','13 - 8 = 5 (ones)','5 - 2 = 3 (tens)','Answer: 35'], answer:'35' },
      practice:[
        { problem:'71 - 46 = ?', answer:'25' },
        { problem:'84 - 37 = ?', answer:'47' },
      ]
    },
    {
      id:'2-place-value-100', emoji:'🧱', title:'Place Value to Hundreds',
      child:'Now we have three places: ones (single cubes), tens (rods of 10), and hundreds (a flat square of 100)! The number 342 means 3 hundreds + 4 tens + 2 ones = 300 + 40 + 2 = 342.',
      parent:'Same place value columns you learned — hundreds, tens, ones. The visual tool today is base-10 blocks: small cubes (1s), rods (10s), and flat squares (100s). Kids build 3-digit numbers with blocks before writing them numerically. This is why they might draw squares, lines, and dots to represent numbers on their homework.',
      example:{ problem:'Write 456 in expanded form', steps:['4 is in the hundreds place: 400','5 is in the tens place: 50','6 is in the ones place: 6','Expanded form: 400 + 50 + 6'], answer:'400 + 50 + 6' },
      practice:[
        { problem:'Write 783 in expanded form', answer:'700 + 80 + 3' },
        { problem:'What number is 5 hundreds, 2 tens, 9 ones?', answer:'529' },
      ]
    },
  ],
  // ── 3RD GRADE ──────────────────────────────────────────────────────────────
  [
    {
      id:'3-multiplication', emoji:'✖️', title:'Multiplication (Arrays & Area Model)',
      child:'Multiplication is just adding equal groups! 4 × 6 means 4 groups of 6. You can draw an array: 4 rows, 6 columns of dots. Count them all = 24. Or draw a rectangle that\'s 4 tall and 6 wide — the area (the space inside) is your answer!',
      parent:'You likely memorized times tables straight away. That\'s still the end goal — but today, kids first build understanding using arrays (dot grids) and area models (rectangles). The area model especially matters because it\'s the same strategy they\'ll use for multi-digit multiplication in 4th and 5th grade. Think of it as learning the "why" before the "what."',
      example:{ problem:'3 × 7 = ?', steps:['Draw 3 rows of 7 dots','Count all the dots: 7, 14, 21','Or skip count by 7s: 7, 14, 21'], answer:'21' },
      practice:[
        { problem:'4 × 5 = ?', answer:'20' },
        { problem:'6 × 8 = ?', answer:'48' },
        { problem:'7 × 3 = ?', answer:'21' },
      ]
    },
    {
      id:'3-division', emoji:'➗', title:'Division (Sharing Equally)',
      child:'Division means splitting into equal groups. 24 ÷ 6 asks: if you share 24 things equally into 6 groups, how many in each group? You can draw 6 circles and deal out dots one at a time until you\'ve used 24. Or think of it as the opposite of multiplication: "6 × ? = 24"',
      parent:'You likely used long division early on. Third grade division stays with equal sharing and the connection to multiplication — no long division yet. The key shift is that kids are taught to think "division is the opposite of multiplication." So 24 ÷ 6 = ? becomes "what times 6 equals 24?" This builds fact-family thinking and makes later algebra much easier.',
      example:{ problem:'18 ÷ 3 = ?', steps:['Ask: 3 × ? = 18','Count by 3s: 3, 6, 9, 12, 15, 18 — that\'s 6 jumps','So 18 ÷ 3 = 6'], answer:'6' },
      practice:[
        { problem:'20 ÷ 4 = ?', answer:'5' },
        { problem:'30 ÷ 6 = ?', answer:'5' },
        { problem:'28 ÷ 7 = ?', answer:'4' },
      ]
    },
    {
      id:'3-fractions', emoji:'🍕', title:'Fractions on a Number Line',
      child:'A fraction like 1/4 means: cut something into 4 equal pieces and take 1. On a number line from 0 to 1, divide it into 4 equal jumps. The first jump lands on 1/4, the second on 2/4, the third on 3/4, and the fourth gets you to 1 (or 4/4). Fractions are just numbers that live between 0 and 1!',
      parent:'You probably learned fractions as "part of a pizza" — part of a circle. That model is still used, but number lines are now a huge emphasis because they show that fractions are actual numbers (not just part of a shape). This is critical for when kids hit decimals and percentages — they\'re all just different points on the same number line. The number line approach is a genuinely better foundation.',
      example:{ problem:'Where does 3/4 land on a number line from 0 to 1?', steps:['Divide the number line into 4 equal sections','Each section = 1/4','Count 3 sections from 0','You land at 3/4, which is just before 1'], answer:'3/4 is 3 equal jumps from 0, one jump before 1' },
      practice:[
        { problem:'Is 2/3 closer to 0 or closer to 1?', answer:'Closer to 1 (it\'s past the halfway point of 1/2)' },
        { problem:'Put these in order from smallest to largest: 3/4, 1/4, 2/4', answer:'1/4, 2/4, 3/4' },
      ]
    },
    {
      id:'3-area', emoji:'📐', title:'Area and Perimeter',
      child:'Perimeter is the distance all the way around a shape — like a fence around a yard. Add up all the sides! Area is the space inside the shape — like carpet on a floor. For a rectangle, multiply length × width.',
      parent:'Same formulas you remember. The difference is that area is now introduced through arrays and unit squares (counting squares inside a rectangle) before the formula is given. So kids might draw a 4×6 grid and count 24 squares before learning "length × width = 24." This connects area directly to multiplication, which they\'re learning at the same time.',
      example:{ problem:'A rectangle is 5 cm long and 3 cm wide. Find the area and perimeter.', steps:['Area = length × width = 5 × 3 = 15 sq cm','Perimeter = add all sides = 5 + 3 + 5 + 3 = 16 cm'], answer:'Area = 15 sq cm, Perimeter = 16 cm' },
      practice:[
        { problem:'A rectangle is 7 m long and 4 m wide. What is its area?', answer:'28 sq m' },
        { problem:'A square has sides of 6 cm. What is its perimeter?', answer:'24 cm' },
      ]
    },
  ],
  // ── 4TH GRADE ──────────────────────────────────────────────────────────────
  [
    {
      id:'4-multi-multiplication', emoji:'✖️', title:'Multi-Digit Multiplication (Area Model)',
      child:'To multiply 23 × 14, draw a big rectangle. Split 23 into 20 and 3 (top). Split 14 into 10 and 4 (side). Now you have 4 smaller boxes:\n• 20 × 10 = 200\n• 20 × 4 = 80\n• 3 × 10 = 30\n• 3 × 4 = 12\nAdd all four boxes: 200 + 80 + 30 + 12 = 322!',
      parent:'You learned to stack numbers and multiply each digit, shifting left for the second row. The area model makes those partial products visible. Those numbers you wrote shifted — 230 and 92 — are the same partial products in the boxes. Once your child understands the area model, the standard algorithm actually makes sense instead of feeling like magic steps.',
      example:{ problem:'32 × 21 = ?', steps:['Break apart: 32 = 30 + 2, and 21 = 20 + 1','30 × 20 = 600','30 × 1 = 30','2 × 20 = 40','2 × 1 = 2','Add: 600 + 30 + 40 + 2 = 672'], answer:'672' },
      practice:[
        { problem:'13 × 12 = ?', answer:'156' },
        { problem:'24 × 11 = ?', answer:'264' },
      ]
    },
    {
      id:'4-division', emoji:'➗', title:'Long Division (Partial Quotients)',
      child:'Partial quotients lets you divide in friendly chunks! For 156 ÷ 6: ask "how many 6s fit easily?" Try 6 × 20 = 120. Subtract: 156 - 120 = 36. Now ask again: 6 × 6 = 36. Subtract: 36 - 36 = 0. Add your guesses: 20 + 6 = 26. Done!',
      parent:'You learned the standard long division algorithm: Divide, Multiply, Subtract, Bring Down — repeated. Partial quotients reaches the same answer by breaking it into steps you choose. There\'s no one "right" chunk — if a child guesses 6 × 10 = 60 instead of 6 × 20, they\'ll just need more steps, but they\'ll still get there. This method reduces errors and lets kids work at their own comfort level.',
      example:{ problem:'168 ÷ 7 = ?', steps:['How many 7s fit? Try 7 × 20 = 140','168 - 140 = 28 remaining','How many 7s in 28? 7 × 4 = 28','28 - 28 = 0','Add the pieces: 20 + 4 = 24'], answer:'24' },
      practice:[
        { problem:'144 ÷ 6 = ?', answer:'24' },
        { problem:'175 ÷ 7 = ?', answer:'25' },
      ]
    },
    {
      id:'4-fractions', emoji:'🔢', title:'Equivalent Fractions',
      child:'Equivalent fractions are different fractions that mean the same amount. 1/2 = 2/4 = 4/8 — they all land on the exact same spot on a number line! To find an equivalent fraction, multiply (or divide) the top AND bottom by the same number.',
      parent:'Same concept you remember — multiply numerator and denominator by the same number. Today it\'s taught visually first: kids draw fraction strips or number lines to see that 1/2 and 2/4 take up the same space. Then the rule (multiply top and bottom by the same number) is introduced as a shortcut after the visual makes sense.',
      example:{ problem:'Find two fractions equivalent to 2/3', steps:['Multiply top and bottom by 2: (2×2)/(3×2) = 4/6','Multiply top and bottom by 3: (2×3)/(3×3) = 6/9','Both 4/6 and 6/9 equal 2/3'], answer:'4/6 and 6/9 (and many more!)' },
      practice:[
        { problem:'Find an equivalent fraction for 3/4', answer:'6/8 (or 9/12, or 12/16, etc.)' },
        { problem:'Are 2/5 and 4/10 equivalent?', answer:'Yes — multiply 2/5 top and bottom by 2 to get 4/10' },
      ]
    },
    {
      id:'4-decimals', emoji:'💯', title:'Decimals — Tenths and Hundredths',
      child:'A decimal is just a fraction in disguise! 0.3 means 3/10 (three tenths). 0.07 means 7/100 (seven hundredths). The dot (decimal point) separates the whole number from the parts. So 1.4 means one whole and 4 tenths.',
      parent:'Decimals were usually introduced as "money math" in your day — $1.25 makes the tenths and hundredths feel real. That approach is still valid! Today decimals are also connected explicitly to fractions on a number line: 0.5 and 1/2 land in the exact same spot. Making that connection early prevents the common confusion where kids treat decimals and fractions as completely separate topics.',
      example:{ problem:'Write 0.6 as a fraction and locate it on a number line from 0 to 1', steps:['0.6 = 6 tenths = 6/10','On a number line divided into 10 parts, count 6 marks from 0','It lands past the halfway point, closer to 1'], answer:'6/10, just past the middle of the number line' },
      practice:[
        { problem:'Write 0.4 as a fraction', answer:'4/10' },
        { problem:'Which is bigger: 0.7 or 0.3?', answer:'0.7 (7 tenths is more than 3 tenths)' },
      ]
    },
  ],
  // ── 5TH GRADE ──────────────────────────────────────────────────────────────
  [
    {
      id:'5-fractions-add', emoji:'➕', title:'Adding & Subtracting Fractions',
      child:'To add fractions, the bottoms (denominators) must match. 1/4 + 1/2: change 1/2 to 2/4 (multiply top and bottom by 2). Now you have 1/4 + 2/4 = 3/4. Once the bottoms match, just add the tops!',
      parent:'Same process — find a common denominator, then add numerators. What\'s new is how it\'s taught: first with fraction strips or number lines so kids see WHY you need a common denominator (you can only combine equal-sized pieces). Then the shortcut (multiply denominators to find a common one) is taught. The visual step is the difference.',
      example:{ problem:'1/3 + 1/4 = ?', steps:['Find a common denominator: 3 × 4 = 12','Convert: 1/3 = 4/12, and 1/4 = 3/12','Add the tops: 4/12 + 3/12 = 7/12'], answer:'7/12' },
      practice:[
        { problem:'1/2 + 1/3 = ?', answer:'5/6' },
        { problem:'3/4 - 1/3 = ?', answer:'5/12' },
      ]
    },
    {
      id:'5-fractions-multiply', emoji:'✖️', title:'Multiplying Fractions',
      child:'Multiplying fractions is actually the easiest operation — just multiply straight across! Top × top, bottom × bottom. So 2/3 × 3/4 = (2×3)/(3×4) = 6/12 = 1/2. You can also think of it as "a fraction of a fraction": 2/3 of 3/4.',
      parent:'Multiplying fractions is the same as you remember — multiply numerators, multiply denominators. What\'s new is the meaning: 2/3 × 3/4 is read as "two-thirds OF three-quarters." Kids draw area models (shaded rectangles) to see this. Also taught is "simplify before you multiply" — for 2/3 × 3/4, cancel the 3s first to get 2/4 = 1/2. Same result, fewer big numbers.',
      example:{ problem:'3/4 × 2/5 = ?', steps:['Multiply the tops: 3 × 2 = 6','Multiply the bottoms: 4 × 5 = 20','Result: 6/20','Simplify by dividing by 2: 3/10'], answer:'3/10' },
      practice:[
        { problem:'1/2 × 3/4 = ?', answer:'3/8' },
        { problem:'2/3 × 4/5 = ?', answer:'8/15' },
      ]
    },
    {
      id:'5-order-of-operations', emoji:'🔢', title:'Order of Operations (PEMDAS)',
      child:'When an expression has multiple operations, there\'s a rule for which to do first:\n1. Parentheses first 🔵\n2. Exponents ⬆️\n3. Multiply and Divide (left to right) ✖️➗\n4. Add and Subtract (left to right) ➕➖\nRemember it with: Please Excuse My Dear Aunt Sally!',
      parent:'PEMDAS is the same acronym you used! (Some places use BODMAS or BEDMAS — same idea, different names.) The main trap parents and kids fall into: Multiplication and Division are equal priority (left to right), as are Addition and Subtraction. So 12 ÷ 3 × 2 is NOT 12 ÷ 6 — you go left to right: (12 ÷ 3) × 2 = 4 × 2 = 8.',
      example:{ problem:'3 + 4 × 2 - 1 = ?', steps:['No parentheses or exponents','Multiply first: 4 × 2 = 8','Now left to right: 3 + 8 - 1','3 + 8 = 11','11 - 1 = 10'], answer:'10' },
      practice:[
        { problem:'(6 + 2) × 3 = ?', answer:'24' },
        { problem:'20 - 4 × 3 + 1 = ?', answer:'9' },
      ]
    },
  ],
  // ── 6TH GRADE ──────────────────────────────────────────────────────────────
  [
    {
      id:'6-ratios', emoji:'⚖️', title:'Ratios',
      child:'A ratio compares two quantities. If there are 2 red balls and 3 blue balls, the ratio of red to blue is 2:3 (read "2 to 3"). It can also be written as 2/3 or "2 out of every 5 balls are red." Order matters — always say which is first!',
      parent:'Ratios may not have been taught much as a standalone topic in your day — they appeared more in word problems. Now they\'re a whole unit. The key idea: ratios aren\'t fractions (though they look similar). 2:3 means "for every 2 of one thing, there are 3 of another" — not "2 out of 3 total." That distinction comes up a lot in real life: recipe scaling, map scales, sports stats.',
      example:{ problem:'A recipe uses 2 cups of flour for every 3 cups of oats. What is the ratio of flour to oats?', steps:['Flour : Oats','2 : 3','For every 2 cups of flour, use 3 cups of oats'], answer:'2:3' },
      practice:[
        { problem:'A class has 12 boys and 15 girls. What is the ratio of boys to girls?', answer:'12:15, which simplifies to 4:5' },
        { problem:'If the ratio of cats to dogs is 3:2 and there are 6 cats, how many dogs?', answer:'4 dogs (3:2 scaled up by 2)' },
      ]
    },
    {
      id:'6-percentages', emoji:'💯', title:'Percentages',
      child:'Percent means "out of 100." So 40% means 40 out of every 100. To find 40% of 80: convert the percent to a decimal (40% = 0.40), then multiply: 0.40 × 80 = 32. You can also think of it as fractions: 40% = 40/100 = 2/5.',
      parent:'Percentages were usually taught as "move the decimal point" tricks. Today they\'re connected to ratios and fractions first, so kids understand what percent means before calculating. The benchmark percents are emphasized: 50% = 1/2, 25% = 1/4, 10% = 1/10. Then harder percents are built from those (30% = 3 × 10%).',
      example:{ problem:'What is 25% of 60?', steps:['25% = 1/4','Find 1/4 of 60: 60 ÷ 4 = 15','Or: 0.25 × 60 = 15'], answer:'15' },
      practice:[
        { problem:'What is 10% of 250?', answer:'25' },
        { problem:'What is 30% of 90?', answer:'27' },
      ]
    },
    {
      id:'6-equations', emoji:'🔡', title:'Writing and Solving Equations',
      child:'An equation is like a balanced scale — both sides must be equal. If 3x + 2 = 11, your goal is to get x alone. Undo the +2 by subtracting 2 from both sides: 3x = 9. Undo the ×3 by dividing both sides by 3: x = 3. Always do the same thing to both sides!',
      parent:'Solving equations is the same process — isolate the variable by doing inverse operations. What\'s new is the language and the transition: kids now write equations to model real situations ("Let x be the number of apples…") and work both ways (write an equation from a situation, solve an equation for a real context). The "scale" visual (balance) is heavily used to show why both sides must stay equal.',

      parent:'Cross multiplication is the same method you used. The buildup is different: kids first use ratio tables and unit rate reasoning before cross multiplication is introduced. A unit rate problem like "if 3 tickets cost $12, how much for 7 tickets?" teaches the same proportional thinking intuitively before the algebraic shortcut.',

      parent:'The rules are identical to what you learned. The key changes: negative numbers are introduced much earlier (7th grade, not high school) and through real-world contexts — temperature below zero, debt, elevation below sea level. The number line is used heavily for addition and subtraction before the rules are memorized, so kids understand the "why" behind "two negatives make a positive."',

      parent:'Slope is the same "rise over run" you may remember from algebra. The emphasis has shifted: students now spend a lot of time understanding slope as a rate of change in real situations (miles per hour, cost per item) before they work with the formula. The equation y = mx + b (slope-intercept form) is the standard form taught first in 8th grade.',

      parent:'Same theorem — a² + b² = c². It\'s now taught with visual proofs (showing the areas of the three squares built on each side really do match up), not just as a rule to memorize. Students are also expected to work backwards: if c = 10 and a = 6, find b. And they apply it to real-world distance problems on a coordinate grid.',

// AI API  (calls our Vercel backend — no API key needed by the parent)
// ─────────────────────────────────────────────────────────────────────────────
async function callExplainAPI({ credential, gradeIndex, question, image }) {
  const res = await fetch('/api/explain', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ credential, gradeIndex, question, image }),
  });
  const data = await res.json();
  if (res.status === 401 || data?.error === 'REAUTH') throw new Error('REAUTH');
  if (!res.ok) throw new Error(data?.error || `Error ${res.status}`);
  if (data.error) throw new Error(data.error);
  return data;
}

function HomeScreen({ user, onGrade, onAsk, onSignIn }) {

  const [image,       setImage]       = useState(null); // { base64, mimeType, preview }
  const [photoGrade,  setPhotoGrade]  = useState(2);
  const fileRef      = useRef(null);
  const photoFileRef = useRef(null);

  const handleImagePick = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1024;
        const scale = Math.min(1, MAX / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width  = Math.round(img.width  * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
        setImage({ base64: dataUrl.split(',')[1], mimeType: 'image/jpeg', preview: dataUrl });
        setPhotoMode(true);
        setAskOpen(false);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const handleAsk = () => {
    if (!askQuestion.trim() && !image) return;
    if (!user) { onSignIn(); return; }
    onAsk({ gradeIndex: askGrade, question: askQuestion.trim(), image });
  };

  const handlePhotoSubmit = () => {
    if (!image) return;

                </button>
              ))}
            </div>

      <p className="text-gray-500 text-sm max-w-xs mb-6 leading-relaxed">{message}</p>
      <button onClick={onBack} className="bg-amber-500 hover:bg-amber-600 text-white font-bold px-6 py-3 rounded-xl transition-colors">
        Go back
      </button>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [screen,         setScreen]         = useState('home');
  const [gradeIndex,     setGradeIndex]     = useState(null);
  const [topicIndex,     setTopicIndex]     = useState(null);
  const [googleClientId, setGoogleClientId] = useState('');
  const [user,           setUser]           = useState(null); // Google ID token credential string
  const [showModal,      setShowModal]      = useState(false);
  const [aiResult,       setAiResult]       = useState(null);
  const [errMsg,         setErrMsg]         = useState('');
  const pendingAsk = useRef(null);

  // Fetch the Google Client ID from our backend on first load
  useEffect(() => {
    fetch('/api/config')
      .then(r => r.json())
      .then(d => {
        const id = d.googleClientId;
        if (id && id !== 'placeholder') {
          setGoogleClientId(id);
        } else {
          // Google not configured yet — treat everyone as signed in
          setUser('__no_auth__');
        }
      })
      .catch(() => {
        // Backend unreachable locally — still allow browsing topics
      });
  }, []);

  const handleSignedIn = (credential) => {
    setUser(credential);
    setShowModal(false);
    if (pendingAsk.current) {
      fireAsk({ ...pendingAsk.current, credential });
      pendingAsk.current = null;
    }
  };

  const fireAsk = async ({ gradeIndex, question, image, credential }) => {
    setScreen('loading');
    try {
      const result = await callExplainAPI({ credential: credential || user, gradeIndex, question, image });
      setAiResult(result);
      setScreen('result');
    } catch (err) {
      if (err.message === 'REAUTH') {
        setUser(null);
        setScreen('home');
        setShowModal(true);
      } else {
        setErrMsg(err.message || 'Unknown error');
        setScreen('error');
      }
    }
  };

  const handleAsk = ({ gradeIndex, question, image }) => {
    if (!user) { pendingAsk.current = { gradeIndex, question, image }; setShowModal(true); return; }
    fireAsk({ gradeIndex, question, image });
  };

  return (
    <div>
      {showModal && (
        <GoogleSignInModal
          googleClientId={googleClientId}
          onSignedIn={handleSignedIn}
          onClose={() => { setShowModal(false); pendingAsk.current = null; }}
        />
      )}
      {screen === 'home'    && <HomeScreen user={user} onGrade={(g) => { setGradeIndex(g); setScreen('topics'); }} onAsk={handleAsk} onSignIn={() => setShowModal(true)} />}
      {screen === 'topics'  && <TopicScreen gradeIndex={gradeIndex} onTopic={(t) => { setTopicIndex(t); setScreen('explain'); }} onBack={() => setScreen('home')} />}
      {screen === 'explain' && <ExplanationCards topic={TOPICS[gradeIndex][topicIndex]} onBack={() => setScreen('topics')} />}
      {screen === 'loading' && <LoadingScreen />}
      {screen === 'result'  && aiResult && <ExplanationCards topic={aiResult} onBack={() => setScreen('home')} />}
      {screen === 'error'   && <ErrorScreen message={errMsg} onBack={() => setScreen('home')} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
